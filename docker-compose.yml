# Local development: Next.js in Docker + Supabase via CLI on the host.
#
# Prefer host dev (simpler): npm run local:up
# Optional containerized Next.js: npm run docker:up
#
# Requires: Docker, Docker Compose v2, Supabase CLI

name: selbstwirksamkeit

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env.docker
        required: true
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - .:/app
      # Mask host .env.local (often production) so Next uses local Supabase keys.
      - ./.env.docker.sync:/app/.env.local:ro
      # Anonymous volumes (not named): inherit node_modules + .next from the image
      # on first use, avoiding root-owned named volumes. See docker/README.md.
      - /app/node_modules
      - /app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
